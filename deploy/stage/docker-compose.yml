services:
  redis:
    image: redis:7-alpine
    container_name: soar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: ../..
      dockerfile: deploy/stage/Dockerfile.orchestrator
    container_name: soar-orchestrator
    ports:
      - "8000:8000"
    volumes:
      - soar-data:/app/data
      - soar-logs:/var/log/soar
    environment:
      - SOAR_CONFIG=/app/config.yaml
      # Токен webhook IRP → SOAR (irp-events); согласован с SOC Core
      # (SOAR_WEBHOOK_TOKEN в их config.json). Пусто = webhook закрыт (403).
      - SOAR_WEBHOOK_TOKEN=${SOAR_WEBHOOK_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: ../..
      dockerfile: deploy/stage/Dockerfile.ui
    container_name: soar-ui
    ports:
      - "3000:80"
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

volumes:
  soar-data:
  soar-logs:
  redis-data:
