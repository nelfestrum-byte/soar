instances:
  irp_main:
    base_url: http://192.168.37.169:5000
    api_token: SOAR_SERVICE_TOKEN_VALUE       # = SOAR_SERVICE_TOKEN в config.json SOC Core
    verify_ssl: false
    timeout: 15
    # heartbeat для детектора UEBA_ORCHESTRATOR_DOWN (Redis SOC Core)
    redis_host: 192.168.37.169
    redis_port: 6379
    redis_password: REDIS_PASSWORD_VALUE      # = REDIS_PASSWORD из .env SOC Core
    heartbeat_ttl: 180                        # < stale_after_sec (200) детектора
